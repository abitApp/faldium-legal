<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0C082A" />
<title>Terms & Conditions — Faldium</title>

<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0C082A;
  --surface: #16123D;
  --text: #ECECEC;
  --muted: #9499C3;
  --accent: #D4A373;
  --border: #252152;
}

/* 🔥 white flash fix */
html, body {
  background: #0C082A;
}

body {
  font-family: 'Figtree', sans-serif;
  color: var(--text);
  padding: 0 1rem 4rem;

  /* fade trick */
  opacity: 0;
  transition: opacity 0.2s ease;
}

header {
  max-width: 720px;
  margin: 0 auto;
  padding: 3rem 0 2rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
}

h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }

.lang-switch {
  margin-top: 1rem;
  font-size: 0.9rem;
}

.lang-switch button {
  background: none;
  border: none;
  color: var(--accent);
  cursor: pointer;
  margin-right: 10px;
  opacity: 0.6;
}

.lang-switch button.active {
  opacity: 1;
  font-weight: 600;
  text-decoration: underline;
}

main { max-width: 720px; margin: 0 auto; }

section { margin-bottom: 2rem; }
h2 { font-size: 1rem; margin-bottom: 0.7rem; }
p, li { font-size: 0.95rem; line-height: 1.7; opacity: 0.9; }

ul { margin-left: 1rem; }

.highlight {
  background: var(--surface);
  padding: 1rem;
  border-left: 3px solid var(--accent);
  margin-top: 0.5rem;
  font-weight: 600;
}
</style>
</head>

<body>

<header>
  <h1>Terms & Conditions</h1>

  <div class="lang-switch">
    🌐 
    <button id="btn-en" onclick="setLang('en')">English</button> | 
    <button id="btn-tr" onclick="setLang('tr')">Türkçe</button>
  </div>
</header>

<main id="content"></main>

<script>

const content = {

en: `
<section>
<h2>Entertainment Only</h2>
<p>Faldium is an AI-powered entertainment application. All readings are generated for entertainment purposes only and do not constitute real predictions, professional advice, or factual information.</p>
<div class="highlight">
Do not make personal, financial, medical, or legal decisions based on the content.
</div>
</section>

<section>
<h2>Payments & Purchases</h2>
<p>We offer free and premium readings.</p>
<ul>
<li>Payments are processed via Google Play Billing</li>
<li>Prices may vary by region and taxes</li>
<li>Digital purchases are generally non-refundable once delivered</li>
</ul>
<p>Refunds are subject to Google Play’s policies.</p>
</section>

<section>
<h2>Use of Service</h2>
<p>You agree to use the app responsibly and not misuse, exploit, or attempt to disrupt the service.</p>
</section>

<section>
<h2>Camera & Content</h2>
<p>You grant permission to use your camera to capture coffee cup images. You are responsible for the content you upload.</p>
</section>

<section>
<h2>Intellectual Property</h2>
<p>All app content, including AI-generated outputs, design, and branding, belongs to ABit and may not be reused commercially.</p>
</section>

<section>
<h2>Limitation of Liability</h2>
<p>ABit is not responsible for any decisions or outcomes based on the app’s content. Use is at your own risk.</p>
</section>

<section>
<h2>Changes</h2>
<p>We may update these terms from time to time. Continued use of the app means you accept the updated terms.</p>
</section>

<section>
<h2>Contact</h2>
<p>support@abit.com</p>
</section>
`,

tr: `
<section>
<h2>Eğlence Amaçlıdır</h2>
<p>Faldium, yapay zeka destekli bir eğlence uygulamasıdır. Sunulan tüm yorumlar yalnızca eğlence amaçlıdır ve gerçek bir öngörü, profesyonel tavsiye veya kesin bilgi içermez.</p>
<div class="highlight">
Uygulamadaki içeriklere dayanarak önemli kararlar almayınız.
</div>
</section>

<section>
<h2>Ödemeler</h2>
<p>Uygulamada ücretsiz ve premium içerikler sunulmaktadır.</p>
<ul>
<li>Ödemeler Google Play üzerinden yapılır</li>
<li>Fiyatlar bölgeye göre değişebilir</li>
<li>Dijital içerikler genellikle iade edilmez</li>
</ul>
<p>İade süreçleri Google Play politikalarına tabidir.</p>
</section>

<section>
<h2>Kullanım</h2>
<p>Uygulamayı kötüye kullanmamayı, sistemi bozacak davranışlarda bulunmamayı kabul edersiniz.</p>
</section>

<section>
<h2>Kamera Kullanımı</h2>
<p>Kahve fincanı fotoğrafları çekmek için kamera izni vermeyi kabul edersiniz. Yüklediğiniz içerikten siz sorumlusunuz.</p>
</section>

<section>
<h2>Fikri Mülkiyet</h2>
<p>Uygulamadaki tüm içerikler ABit’e aittir ve ticari amaçla kullanılamaz.</p>
</section>

<section>
<h2>Sorumluluk Reddi</h2>
<p>Uygulama içeriğine dayanarak alınan kararlardan ABit sorumlu değildir.</p>
</section>

<section>
<h2>Değişiklikler</h2>
<p>Bu şartlar zaman zaman güncellenebilir. Uygulamayı kullanmaya devam etmeniz yeni şartları kabul ettiğiniz anlamına gelir.</p>
</section>

<section>
<h2>İletişim</h2>
<p>support@abit.com</p>
</section>
`
};

function setLang(lang) {
  document.getElementById("content").innerHTML = content[lang];

  document.getElementById("btn-en").classList.remove("active");
  document.getElementById("btn-tr").classList.remove("active");

  document.getElementById("btn-" + lang).classList.add("active");
}

// default TR
setLang('tr');

// 🔥 fade-in fix
window.addEventListener("load", () => {
  document.body.style.opacity = "1";
});

</script>

</body>
</html>
