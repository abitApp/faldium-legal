<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Privacy Policy — Faldium</title>

<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0C082A;
  --surface: #16123D;
  --text: #ECECEC;
  --muted: #9499C3;
  --accent: #D4A373;
  --border: #252152;
}

body {
  font-family: 'Figtree', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 0 1rem 4rem;
}

header {
  max-width: 720px;
  margin: 0 auto;
  padding: 3rem 0 2rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
}

h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
.meta { font-size: 0.85rem; color: var(--muted); }

.lang-switch {
  margin-top: 1rem;
  font-size: 0.9rem;
}

.lang-switch button {
  background: none;
  border: none;
  color: var(--accent);
  cursor: pointer;
  margin-right: 10px;
}

main { max-width: 720px; margin: 0 auto; }

section { margin-bottom: 2rem; }
h2 { font-size: 1rem; margin-bottom: 0.7rem; }
p, li { font-size: 0.95rem; line-height: 1.7; color: var(--text); opacity: 0.9; }

ul { margin-left: 1rem; }

.highlight {
  background: var(--surface);
  padding: 1rem;
  border-left: 3px solid var(--accent);
  margin-top: 0.5rem;
}

</style>
</head>

<body>

<header>
  <h1>Privacy Policy</h1>
  <p class="meta">Last Updated: March 2026</p>

  <div class="lang-switch">
    🌐 
    <button onclick="setLang('en')">English</button> | 
    <button onclick="setLang('tr')">Türkçe</button>
  </div>
</header>

<main id="content"></main>

<script>

const content = {
en: `
<p>Welcome to Faldium. Your privacy matters to us.</p>

<section>
<h2>Information We Collect</h2>
<ul>
<li>Camera & photos (for coffee readings)</li>
<li>Email (authentication & history)</li>
<li>Payment info via Google Play Billing</li>
</ul>
</section>

<section>
<h2>How We Use Data</h2>
<ul>
<li>Generate AI-based coffee readings</li>
<li>Provide free and premium experiences</li>
</ul>
<div class="highlight">
Photos are used only for generating your reading and not for training or other purposes.
</div>
</section>

<section>
<h2>Third-Party Services</h2>
<p>We may share data with trusted providers such as Supabase, Firebase, and AI processing services strictly to operate the app.</p>
</section>

<section>
<h2>Data Retention</h2>
<p>We keep your data while your account is active. You can request deletion anytime.</p>
</section>

<section>
<h2>Security</h2>
<p>We use industry-standard security measures to protect your data.</p>
</section>

<section>
<h2>Children</h2>
<p>This app is not intended for children under 13.</p>
</section>

<section>
<h2>Contact</h2>
<p>support@abit.com</p>
</section>
`,

tr: `
<p>Faldium'a hoş geldiniz. Gizliliğiniz bizim için önemlidir.</p>

<section>
<h2>Toplanan Veriler</h2>
<ul>
<li>Kamera ve fotoğraflar (fal analizi için)</li>
<li>Email (hesap ve geçmiş kayıtlar)</li>
<li>Ödeme bilgileri (Google Play üzerinden)</li>
</ul>
</section>

<section>
<h2>Veri Kullanımı</h2>
<ul>
<li>Yapay zeka ile kahve falı yorumlama</li>
<li>Ücretsiz ve premium deneyim sağlama</li>
</ul>
<div class="highlight">
Fotoğraflar yalnızca fal yorumlamak için kullanılır, başka amaçlarla kullanılmaz.
</div>
</section>

<section>
<h2>Üçüncü Taraf Hizmetler</h2>
<p>Verileriniz, uygulamanın çalışması için Supabase, Firebase ve AI servis sağlayıcıları ile paylaşılabilir.</p>
</section>

<section>
<h2>Veri Saklama</h2>
<p>Verileriniz hesabınız aktif olduğu sürece saklanır. İstediğiniz zaman silebilirsiniz.</p>
</section>

<section>
<h2>Güvenlik</h2>
<p>Verilerinizi korumak için endüstri standartlarında güvenlik önlemleri uygulanır.</p>
</section>

<section>
<h2>Çocuklar</h2>
<p>Bu uygulama 13 yaş altı kullanıcılar için uygun değildir.</p>
</section>

<section>
<h2>İletişim</h2>
<p>support@abit.com</p>
</section>
`
};

function setLang(lang) {
  document.getElementById("content").innerHTML = content[lang];
}

// auto detect
const userLang = navigator.language.startsWith('tr') ? 'tr' : 'en';
setLang(userLang);

</script>

</body>
</html>
